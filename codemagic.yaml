workflows:
  ios-build-only:
    name: iOS - Generar IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios-vars
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20.19.2
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app (Vue + Vite)
        script: npm run build

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set up keychain
        script: keychain initialize

      - name: Set up certificate
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates \
            --certificate /tmp/certificate.p12 \
            --certificate-password $CM_CERTIFICATE_PASSWORD

      - name: Set up provisioning profile
        script: |
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          PROFILE_UUID=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract UUID raw -)
          echo "Profile UUID: $PROFILE_UUID"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV

      - name: Build & archive iOS
        script: |
          set -o pipefail
          ARCHIVE_PATH="$CM_BUILD_DIR/ios/App.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/ios/ipa"
          EXPORT_PLIST="/tmp/export_options.plist"

          # Paso 1: Archive — pasamos el provisioning profile aquí
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=FRTBXBGQ9G \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID"

          # Paso 2: Crear export options
          cat > $EXPORT_PLIST << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>FRTBXBGQ9G</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.easysuper.app</key>
                  <string>$PROFILE_UUID</string>
              </dict>
          </dict>
          </plist>
          EOF

          # Paso 3: Exportar el .ipa
          mkdir -p "$IPA_DIR"
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist "$EXPORT_PLIST"

    artifacts:
      - "**/*.ipa"
      - "**/*.xcarchive"
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        apple_id: "6773418692"
        submit_to_testflight: true
        submit_to_app_store: false
