workflows:
  ios-build-only:
    name: iOS - Generar IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios-vars
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.easysuper.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20.x
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app (Vue + Vite)
        script: npm run build

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build & archive iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    # El .ipa queda disponible para descargar desde el dashboard de Codemagic
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
